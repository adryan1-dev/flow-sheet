<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editar Registro</title>
    <style>
        :root {
            --bg: #0b1118;
            --panel: #131c26;
            --line: #253445;
            --text: #ebf3fb;
            --muted: #94a8bc;
            --accent: #8ef0a7;
            --accent-strong: #56d67a;
            --accent-shadow: #2a8f48;
            --link: #8dc7ff;
        }

        * { box-sizing: border-box; }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
            background:
                radial-gradient(circle at top, rgba(142, 240, 167, 0.12), transparent 28%),
                linear-gradient(180deg, #0d141c 0%, var(--bg) 100%);
            color: var(--text);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px 16px;
        }

        .panel {
            width: min(680px, 100%);
            background: rgba(19, 28, 38, 0.94);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 28px;
            box-shadow: 0 24px 80px rgba(0, 0, 0, 0.38);
            padding: 34px 28px 30px;
            backdrop-filter: blur(10px);
        }

        .header {
            display: flex;
            align-items: flex-start;
            justify-content: space-between;
            gap: 12px;
            flex-wrap: wrap;
            margin-bottom: 24px;
        }

        h2 {
            margin: 0;
            font-size: clamp(1.8rem, 4vw, 2.4rem);
        }

        .subtitle {
            margin: 8px 0 0;
            color: var(--muted);
            max-width: 44ch;
            line-height: 1.5;
        }

        .back-link {
            color: var(--link);
            text-decoration: none;
            font-weight: 700;
            border: 1px solid var(--line);
            padding: 10px 14px;
            border-radius: 12px;
            background: rgba(255, 255, 255, 0.03);
        }

        form {
            display: grid;
            gap: 18px;
        }

        .field {
            display: grid;
            gap: 8px;
        }

        label {
            color: var(--muted);
            font-size: 0.92rem;
            font-weight: 600;
        }

        input {
            width: 100%;
            padding: 14px 16px;
            border-radius: 14px;
            border: 1px solid var(--line);
            background: rgba(255, 255, 255, 0.02);
            color: var(--text);
            outline: none;
        }

        input:focus {
            border-color: rgba(142, 240, 167, 0.45);
            box-shadow: 0 0 0 4px rgba(142, 240, 167, 0.08);
        }

        .submit-button {
            justify-self: start;
            margin-top: 6px;
            border: 0;
            background: linear-gradient(180deg, var(--accent) 0%, var(--accent-strong) 100%);
            color: #04250f;
            font-size: 0.98rem;
            font-weight: 700;
            padding: 14px 28px;
            border-radius: 14px;
            cursor: pointer;
            box-shadow: 0 10px 0 var(--accent-shadow), 0 18px 28px rgba(86, 214, 122, 0.28);
        }
    </style>
</head>
<body>
    <main class="panel">
        <div class="header">
            <div>
                <h2>Editar registro</h2>
                <p class="subtitle">
                    Atualize os dados desta linha da planilha. Ao salvar, o status será redefinido para pendente para permitir nova execução com os dados corrigidos.
                </p>
            </div>
            <a class="back-link" href="{% url 'listar_registros' %}">Voltar</a>
        </div>

        <form method="post">
            {% csrf_token %}

            <div class="field">
                <label for="nome">Nome</label>
                <input id="nome" name="nome" type="text" value="{{ registro.nome }}" required>
            </div>

            <div class="field">
                <label for="empresa">Empresa</label>
                <input id="empresa" name="empresa" type="text" value="{{ registro.empresa }}" required>
            </div>

            <div class="field">
                <label for="email">Email</label>
                <input id="email" name="email" type="email" value="{{ registro.email }}" required>
            </div>

            <div class="field">
                <label for="telefone">Telefone</label>
                <input id="telefone" name="telefone" type="text" value="{{ registro.telefone }}" required>
            </div>

            <button class="submit-button" type="submit">Salvar alterações</button>
        </form>
    </main>
</body>
</html>
