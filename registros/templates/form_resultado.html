<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Resultado do Formulario</title>
    <style>
        :root {
            --bg: #0b1118;
            --panel: #131c26;
            --line: #253445;
            --text: #ebf3fb;
            --muted: #94a8bc;
            --accent: #8ef0a7;
            --accent-soft: rgba(142, 240, 167, 0.12);
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
            background:
                radial-gradient(circle at top, rgba(142, 240, 167, 0.12), transparent 28%),
                linear-gradient(180deg, #0d141c 0%, var(--bg) 100%);
            color: var(--text);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px 16px;
        }

        .panel {
            width: min(620px, 100%);
            background: rgba(19, 28, 38, 0.94);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 28px;
            box-shadow: 0 24px 80px rgba(0, 0, 0, 0.38);
            padding: 36px 28px 32px;
            backdrop-filter: blur(10px);
        }

        h2 {
            margin: 0 0 10px;
            text-align: center;
            font-size: clamp(1.8rem, 4vw, 2.4rem);
        }

        .subtitle {
            margin: 0 auto 28px;
            max-width: 38ch;
            text-align: center;
            color: var(--muted);
            line-height: 1.6;
        }

        .result-list {
            display: grid;
            gap: 14px;
        }

        .result-item {
            padding: 16px 18px;
            border-radius: 16px;
            border: 1px solid var(--line);
            background: rgba(255, 255, 255, 0.02);
        }

        .result-label {
            display: block;
            font-size: 0.8rem;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: var(--muted);
            margin-bottom: 6px;
        }

        .result-value {
            color: var(--text);
            font-size: 1rem;
            word-break: break-word;
        }

        .result-badge {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 24px;
            padding: 8px 14px;
            border-radius: 999px;
            border: 1px solid rgba(142, 240, 167, 0.18);
            background: var(--accent-soft);
            color: var(--accent);
            font-weight: 700;
        }
    </style>
</head>
<body>
    <main class="panel">
        <div class="result-badge">Dados recebidos com sucesso</div>
        <h2>Resultado do formulario</h2>
        <p class="subtitle">
            Esta pagina confirma os dados enviados pelo formulario de teste durante a automacao.
        </p>

        <section class="result-list">
            <article class="result-item">
                <span class="result-label">Nome</span>
                <span class="result-value">{{ nome }}</span>
            </article>

            <article class="result-item">
                <span class="result-label">Empresa</span>
                <span class="result-value">{{ empresa }}</span>
            </article>

            <article class="result-item">
                <span class="result-label">Email</span>
                <span class="result-value">{{ email }}</span>
            </article>

            <article class="result-item">
                <span class="result-label">Telefone</span>
                <span class="result-value">{{ telefone }}</span>
            </article>
        </section>
    </main>
</body>
</html>
