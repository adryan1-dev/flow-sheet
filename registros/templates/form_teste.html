<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formulario de Teste</title>
    <style>
        :root {
            --bg: #0b1118;
            --panel: #131c26;
            --line: #253445;
            --text: #ebf3fb;
            --muted: #94a8bc;
            --accent: #8ef0a7;
            --accent-strong: #56d67a;
            --accent-shadow: #2a8f48;
        }

        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
            background:
                radial-gradient(circle at top, rgba(142, 240, 167, 0.12), transparent 28%),
                linear-gradient(180deg, #0d141c 0%, var(--bg) 100%);
            color: var(--text);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px 16px;
        }

        .panel {
            width: min(640px, 100%);
            background: rgba(19, 28, 38, 0.94);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 28px;
            box-shadow: 0 24px 80px rgba(0, 0, 0, 0.38);
            padding: 36px 28px 32px;
            backdrop-filter: blur(10px);
        }

        h2 {
            margin: 0 0 10px;
            text-align: center;
            font-size: clamp(1.8rem, 4vw, 2.4rem);
        }

        .subtitle {
            margin: 0 auto 28px;
            max-width: 42ch;
            text-align: center;
            color: var(--muted);
            line-height: 1.6;
        }

        form {
            display: grid;
            gap: 18px;
        }

        .field {
            display: grid;
            gap: 8px;
        }

        label {
            font-size: 0.92rem;
            font-weight: 600;
            color: var(--muted);
        }

        input {
            width: 100%;
            padding: 14px 16px;
            border-radius: 14px;
            border: 1px solid var(--line);
            background: rgba(255, 255, 255, 0.02);
            color: var(--text);
            outline: none;
            transition: border-color 0.2s ease, box-shadow 0.2s ease;
        }

        input:focus {
            border-color: rgba(142, 240, 167, 0.45);
            box-shadow: 0 0 0 4px rgba(142, 240, 167, 0.08);
        }

        .submit-button {
            justify-self: center;
            margin-top: 8px;
            border: 0;
            background: linear-gradient(180deg, var(--accent) 0%, var(--accent-strong) 100%);
            color: #04250f;
            font-size: 0.98rem;
            font-weight: 700;
            padding: 14px 28px;
            border-radius: 14px;
            cursor: pointer;
            box-shadow:
                0 10px 0 var(--accent-shadow),
                0 18px 28px rgba(86, 214, 122, 0.28);
            transform: translateY(0);
            transition: transform 0.15s ease, box-shadow 0.15s ease, filter 0.15s ease;
        }

        .submit-button:hover {
            filter: brightness(1.04);
            transform: translateY(-2px);
            box-shadow:
                0 12px 0 var(--accent-shadow),
                0 22px 34px rgba(86, 214, 122, 0.32);
        }

        .submit-button:active {
            transform: translateY(6px);
            box-shadow:
                0 4px 0 var(--accent-shadow),
                0 10px 16px rgba(86, 214, 122, 0.22);
        }
    </style>
</head>
<body>
    <main class="panel">
        <h2>Formulario de teste</h2>
        <p class="subtitle">
            Esta tela simula o sistema externo que sera preenchido automaticamente pelo Playwright.
        </p>

        <form method="post">
            {% csrf_token %}

            <div class="field">
                <label for="nome">Nome</label>
                <input type="text" name="nome" id="nome">
            </div>

            <div class="field">
                <label for="empresa">Empresa</label>
                <input type="text" name="empresa" id="empresa">
            </div>

            <div class="field">
                <label for="email">Email</label>
                <input type="email" name="email" id="email">
            </div>

            <div class="field">
                <label for="telefone">Telefone</label>
                <input type="text" name="telefone" id="telefone">
            </div>

            <button class="submit-button" type="submit">Enviar</button>
        </form>
    </main>
</body>
</html>
